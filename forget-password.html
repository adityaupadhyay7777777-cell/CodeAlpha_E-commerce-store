<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="auth-section" id="forget-password-section">
        <h2>Reset Password</h2>
        <p>Enter your email and new password.</p>
        <form onsubmit="event.preventDefault(); forgotPassword();">
            <input id="forget-email" type="email" placeholder="Enter your email" required>
            <input id="new-password" type="password" placeholder="Enter new password" required>
            <button type="submit">Change Password</button>
        </form>
        <div id="forget-message" style="margin-bottom: 10px;"></div>
        <div>Remembered your password? <a href="login.html">Login</a></div>
    </div>
</body>
</html>
